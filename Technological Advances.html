<div id="translatorContainer" style="text-align: center; margin: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
  <!-- Button to trigger Google Translate -->
  <button id="translateButton" style="margin-bottom: 5px;">Translate</button>

  <!-- Container for Google Translate widget -->
  <div id="google_translate_element" style="display: none;"></div>
</div>

<script>
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'en'
    }, 'google_translate_element');
  }
</script>

<script src="http://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

<script>
  // Add event listener to show Google Translate widget on button click
  document.getElementById('translateButton').addEventListener('click', function() {
    var translateElement = document.getElementById('google_translate_element');
    
    // Toggle the visibility of the Google Translate widget
    if (translateElement.style.display === 'none') {
      translateElement.style.display = 'block';
    } else {
      translateElement.style.display = 'none';
    }
  });

  // Prevent zooming on 'Ctrl + Mouse Wheel'
  document.addEventListener('wheel', function(e) {
    if (e.ctrlKey) {
      e.preventDefault(); // Prevent zooming when pressing 'Ctrl + Mouse Wheel'
    }
  }, { passive: false });
</script>

  <script>
    // Function to open the modal
    function openModal() {
      document.getElementById('formModal').style.display = 'flex';
    }
  
    // Function to close the modal
    function closeModal() {
      document.getElementById('formModal').style.display = 'none';
    }
  
    // Close modal if clicked outside of content
    window.onclick = function(event) {
      var modal = document.getElementById('formModal');
      if (event.target == modal) {
        closeModal();
      }
    }
  </script>
